<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Navbar</title>
    <style> 
        body{
    font-family: airal;
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(rgb(68, 9, 68), rgb(1, 1, 49));

}

nav{
    margin-top: 100px;
    background-color: rgb(252, 252, 252);
    padding: 10px;
    display: flex;
    gap: 20px;
    border-radius: 10px;
    align-items: center;
}

nav a{
    text-decoration: none;
    color: black;
    font-size: 16px;
    padding: 10px 20px;   
}

.dropdown{
    font-size: 16px;
    padding: 10px 20px;
    border:none;
    cursor: pointer;
}

.dropdown-content{
    display:none;
    position:absolute;
    background: rgb(107, 101, 101);
    min-width: 150px;
}

.dropdown-content a{
    display: block;
    padding: 10px;
    text-decoration: none;
    color: black;
    font-size: 14px;
}

.dropdown-content a:hover{
    color:white;
    transition: 0.5s;
}

.dropdown:hover .dropdown-content{
    display: block;

}

    </style>
    
</head>
<body>
    
    <nav>
        <a href="#">Home</a>
        <div class="dropdown">
           <button class="drpbtn">Services ▼ </button>
              <div class="dropdown-content">
                <a href="#">Design</a>
                <a href="#">Development</a>
                <a href="#">Marketing</a>
                <a href="#">Accessibility</a>
            </div>      
        </div>
        <div class="dropdown">
          <button class="drpbtn">Protfolio ▼ </button>
        </div>

        <div class="dropdown">
          <button class="drpbtn">About ▼ </button>
        </div>
    </nav> 
    
</body>
</html>
