<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style> 
        body{
    margin: 0%;
    font-family: Arial, Helvetica, sans-serif;
}

nav{
    background-color: yellow;
    padding: 50px;
    
}

nav a{
    text-decoration: none;
    color: purple;
    font-size: 18px;
    padding: 10px 20px;
    border-right: 2px solid purple;
    
}
nav a:last-child{
    border-right: none;
}

nav a:hover{
    background-color: purple;
    color:yellow;
    transition: 0.5s;
}
    </style>
</head>

<body>
    <nav>
        <a href="#"> Home</a>
        <a href="#"> About</a>
        <a href="#"> Services</a>
        <a href="#"> Gallery</a>
        <a href="#"> Contact</a>

    </nav>
    
</body>
</html>
