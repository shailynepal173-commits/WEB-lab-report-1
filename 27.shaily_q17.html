<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration/Login Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1200')
    no-repeat center center/cover;
}

.container{
    width:900px;
    background:rgba(0,0,0,0.5);
    padding:30px;
}

.container h1{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.forms{
    display:flex;
    gap:20px;
}

.form-box{
    flex:1;
    background:rgba(0,0,0,0.6);
    padding:20px;
}

.form-box h2{
    color:#00cfff;
    margin-bottom:15px;
}

input[type="text"],
input[type="email"],
input[type="password"]{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    outline:none;
    background:#ddd;
}

small{
    color:#aaa;
    font-size:12px;
}

.gender,
.terms,
.remember{
    color:white;
    margin-top:12px;
    font-size:14px;
}

.gender label{
    margin-right:20px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#d89d1b;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.footer{
    text-align:center;
    color:white;
    margin-top:20px;
    font-size:12px;
}
</style>

</head>
<body>

<div class="container">

    <h1>REGISTRATION / LOGIN FORM</h1>

    <div class="forms">

        <!-- Registration Form -->
        <div class="form-box">
            <h2>Register Form :</h2>

            <input type="text" placeholder="Username">

            <input type="email" placeholder="Email">
            <small>Please enter a valid email address</small>

            <input type="password" placeholder="Password">
            <small>Minimum of 6 characters</small>

            <input type="password" placeholder="Confirm Password">

            <div class="gender">
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Male</label>
            </div>

            <div class="terms">
                <label>
                    <input type="checkbox">
                    I have read and accept terms of use.
                </label>
            </div>

            <button type="submit">SUBMIT</button>
        </div>

        <!-- Login Form -->
        <div class="form-box">
            <h2>Login Form :</h2>

            <input type="email" placeholder="Enter Your Email">

            <input type="password" placeholder="Password">

            <div class="remember">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>
            </div>

            <button type="submit">LOGIN</button>
        </div>

    </div>

    <div class="footer">
        © 2025 Registration / Login Form. All Rights Reserved.
    </div>

</div>

</body>
</html>
