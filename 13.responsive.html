<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #ef4444;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .main {
            background: #ffffff;
            padding: 20px;
            flex: 1;
            text-align: center;
        }

        .left {
            background: #facc15;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }

        .right {
            background: #4ade80;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }

        footer {
            background: #3b82f6;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Mobile - Default */
        .main-content {
            display: flex;
            flex-direction: column;
        }

        /* Tablet */
        @media (min-width: 640px) {
            .main-content {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .main {
                flex: 1 1 100%;
            }
            
            .left, .right {
                flex: 1;
            }
        }

        /* Desktop */
        @media (min-width: 1024px) {
            .main-content {
                flex-direction: row;
                flex-wrap: nowrap;
            }
            
            .left {
                flex: 0 0 220px;
            }
            
            .main {
                flex: 1;
            }
            
            .right {
                flex: 0 0 220px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>
        
        <div class="main-content">
            <div class="main">Main</div>
            <div class="left">Left</div>
            <div class="right">Right</div>
        </div>
        
        <footer>Footer</footer>
    </div>
</body>
</html>
