<!DOCTYPE html>
<html>
<head>
    <title>Image and Iframe nb</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .column {
            width: 50%;
        }

        h2 {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h1>Media Display</h1>

    <div class="container">

        <div class="column">
            <h2>Image</h2>
            <img src="./images/w3.webp" alt="Example Image" width="100%" height="300">
        </div>

        <div class="column">
            <h2>Iframe</h2>
            <iframe src="https://www.wikipedia.org"
                    width="100%"
                    height="300">
            </iframe>
        </div>

    </div>

</body>
</html>
