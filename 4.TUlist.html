<!DOCTYPE html>
<html lang="en">
    <head>
        <title> TU faculties and Programs </title>

        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
            }
            h1 {
                
                text-align: center;
            }
            .title {
                font-weight: bold;
                padding: 10px;
    
            }
            li.faculty{
                margin-bottom: 20px;
            }

        </style>
    </head>

    
    <body>
        <h1> TU Faculties and Programs </h1>

        <ol>
            <li class="faculty">
                <span class="title"> Faculty of Science </span>
                <ul>
                    <li> Computer Science </li>
                    <li> Physics </li>
                    <li> Chemistry </li>
                </ul>
            </li>

            <li class="faculty">
                <span class="title"> Faculty of Arts </span>
                <ul>
                    <li> History </li>
                    <li> Literature </li>
                    <li> Philosophy </li>
                </ul>
            </li>

            <li class="faculty">
                <span class="title"> Faculty of Engineering </span>
                <ul>
                    <li> Mechanical Engineering </li>
                    <li> Electrical Engineering </li>
                    <li> Civil Engineering </li>
                </ul>
            </li>

           
        </ol>
    </body>
