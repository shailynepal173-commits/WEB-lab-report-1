<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Service Commission</title>
    
    <style>
        body{
    margin:20px;
    font-family:Arial, sans-serif;
    background-color:#f5f5f5;
}

header{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:20px;
}

header img{
    width:60px;
    height:60px;
}

header h1{
    margin-left:15px;
    color:navy;
}

form{
    max-width:600px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

form label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

form input,
form select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

.gender{
    margin-top:15px;
}

.gender label{
    display:inline;
    font-weight:normal;
}

.gender input{
    width:auto;
    margin-left:15px;
    margin-right:5px;
}

.buttons{
    margin-top:25px;
    text-align:center;
}

.buttons input{
    width:auto;
    padding:10px 20px;
    margin:5px;
    border:1px solid navy;
    background:white;
    color:navy;
    border-radius:5px;
    cursor:pointer;
}

.buttons input:hover{
    background-color:navy;
    color:white;
}

/* Tablet */
@media screen and (max-width:768px){

    body{
        margin:15px;
    }

    form{
        padding:20px;
    }

    header h1{
        font-size:28px;
    }
}

/* Mobile */
@media screen and (max-width:600px){

    header{
        flex-direction:column;
        text-align:center;
    }

    header h1{
        margin-left:0;
        margin-top:10px;
        font-size:22px;
    }

    form{
        max-width:100%;
        padding:15px;
    }

    .gender{
        display:flex;
        flex-wrap:wrap;
        align-items:center;
        gap:8px;
    }

    .buttons{
        display:flex;
        flex-direction:column;
    }

    .buttons input{
        width:100%;
    }
}
    </style>
</head>
<body>

    <header>
        <img src="./images/psclogo.png" alt="Public Service Commission Logo">
        <h1>Public Service Commission</h1>
    </header>

    <form action="submit_form.php" method="post">

        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" required>

        <label for="middleName">Middle Name:</label>
        <input type="text" id="middleName" name="middleName">

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" required>

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>

        <label for="dobBS">Date of Birth (B.S):</label>
        <input type="date" id="dobBS" name="dobBS" required>

        <label for="dobAD">Date of Birth (A.D):</label>
        <input type="date" id="dobAD" name="dobAD" required>

        <div class="gender">
            <label>Gender:</label>

            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">Other</label>
        </div>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="citizenshipNumber">Citizenship Number:</label>
        <input type="text" id="citizenshipNumber" name="citizenshipNumber" required>

        <label for="district">Citizenship Issue District:</label>
        <select id="district" name="district" required>
            <option value="">Select District</option>
            <option value="Kathmandu">Kathmandu</option>
            <option value="Lalitpur">Lalitpur</option>
            <option value="Bhaktapur">Bhaktapur</option>
        </select>

        <label for="issueDateBS">Citizenship Issue Date (B.S):</label>
        <input type="date" id="issueDateBS" name="issueDateBS" required>

        <label for="issueDateAD">Citizenship Issue Date (A.D):</label>
        <input type="date" id="issueDateAD" name="issueDateAD" required>

        <div class="buttons">
            <input type="button" value="Back to Login">
            <input type="submit" value="Submit">
        </div>

    </form>

</body>
</html>
